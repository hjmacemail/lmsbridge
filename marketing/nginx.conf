server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    # Serve SEO/GEO assets at the root with sensible content types.
    location = /robots.txt { default_type text/plain; }
    location = /llms.txt   { default_type text/plain; }
    location = /sitemap.xml { default_type application/xml; }
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/xml text/plain application/ld+json;
}
