name: Release (build & publish images)

# Builds the three service images and pushes them to the GitHub Container
# Registry (GHCR) so anyone can run LMS Bridge with NO local build, using
# docker-compose.prod.yml. Images are published when you push a version tag
# (e.g. `git tag v1.0.0 && git push origin v1.0.0`) and on every push to main
# (tagged `:edge`). You can also trigger it manually from the Actions tab.

on:
  push:
    tags: ["v*.*.*"]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Image base = ghcr.io/<owner>/lmsbridge-<service>, lower-cased.
  IMAGE_PREFIX: ${{ github.repository_owner }}/lmsbridge

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend, marketing]
    steps:
      - uses: actions/checkout@v4

      - name: Lower-case image name
        id: img
        run: echo "name=${REGISTRY}/${IMAGE_PREFIX}-${{ matrix.service }}" | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
