# Fly.io config for the backend. Deploy: fly deploy -c infra/fly.backend.toml
app = "lms-bridge-backend"
primary_region = "iad"

[build]
  dockerfile = "../backend/Dockerfile"

[env]
  APP_ENV = "production"
  LLM_PROVIDER = "mock"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  path = "/api/v1/health"
  interval = "15s"
  timeout = "2s"
