# Railway config for the backend service.
# Set this service's Root Directory to "backend" in the Railway dashboard.
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "alembic upgrade head && python -m app.scripts.seed --if-empty && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
